# 媒体配置：对应 Docusaurus 的 static 目录
media:
  input: static/img
  output: /img

collections:
  # --- 文档配置 (Documentation) ---
  - name: docs
    label: 项目文档
    type: folder
    path: docs
    format: md
    # 允许递归子目录，Docusaurus 的文档通常有多级分类
    exclude: ["node_modules"]
    fields:
      - name: title
        label: 文档标题
        type: string
        help: "显示在页面顶部的 H1 标题"
      - name: sidebar_label
        label: 侧边栏名称
        type: string
        help: "简短名称，用于左侧菜单显示"
      - name: sidebar_position
        label: 排序权重
        type: number
        help: "数字越小越靠前"
      - name: description
        label: 页面描述 (SEO)
        type: text
      - name: body
        label: 正文
        type: rich-text

  # --- 博客配置 (Blog) ---
  - name: blog
    label: 官方博客
    type: folder
    path: blog
    format: md
    slug: "{year}-{month}-{day}-{slug}"
    fields:
      - name: title
        label: 文章标题
        type: string
      - name: date
        label: 发布日期
        type: datetime
      - name: authors
        label: 作者 ID
        type: string
        help: "对应 authors.yml 中的 key，或直接写姓名"
      - name: tags
        label: 标签
        type: string
        help: "用中括号包裹，如 [tech, news]"
      - name: image
        label: 封面图
        type: image
      - name: body
        label: 博客内容
        type: rich-text